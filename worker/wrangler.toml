# woovi-kyc upload worker
# Docs: https://developers.cloudflare.com/workers/

name = "woovi-kyc-upload"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# R2 bucket binding — the Worker accesses R2 through this binding (no API keys needed)
[[r2_buckets]]
binding = "KYC_BUCKET"
bucket_name = "woovi-kyc-uploads"

# Environment variables
[vars]
# Public URL where uploaded files can be accessed.
# For local dev this is the worker itself: http://localhost:8787/file
# For production, update to your deployed Worker URL: https://woovi-kyc-upload.yourname.workers.dev/file
R2_PUBLIC_URL = "http://localhost:8787/file"

# Allowed origins for CORS (comma-separated).
# In production, restrict to your app's domain.
ALLOWED_ORIGINS = "http://localhost:3000,http://localhost:3001"
